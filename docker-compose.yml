services:
  db:
    image: postgres:18
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: spring_api
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DB_HOST: db
      DB_NAME: crud_db
      DB_USER: postgres
      DB_PASSWORD: password123
    depends_on:
      - db