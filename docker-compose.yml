services:
  db:
    image: postgres:18
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: spring_api
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PUBLIC_KEY: file:/app/app.pub
      JWT_PRIVATE_KEY: file:/app/app.key
    depends_on:
      db:
        condition: service_healthy

